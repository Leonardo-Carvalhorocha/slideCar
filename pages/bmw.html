<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Intacto Motors</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <header>
    <div class="nav-container">
      <a href="../index.html"><img src="../img/logo/logo.png" alt=""></a>
      <nav class="menu" data-menu="suave">
        <button data-menu="button" aria-expanded="false" aria-controls="menu">Menu</button>
        <ul data-menu="list" id="menu">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="#">Empresa</a></li>
          <li><a href="#">Diferencias</a></li>
          <li><a href="#">Galeria</a></li>
          <li><a href="#">Serviços</a></li>
          <li><a href="#">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section>
    <div id="container-car">
      <div id="nav-car">
        <div class="list-car">
          <nav>
            <ul>
              <li>
                <img src="../img/bmwx1/TMO02489.JPG" alt="carro">
              </li>
              <li>
                <img src="../img/bmwx1/TMO02474.JPG" alt="carro">
              </li>
              <li>
                <img src="../img/bmwx1/TMO02484.JPG" alt="carro">
              </li>
              <li>
                <img src="../img/bmwx1/TMO02496.JPG" alt="carro">
              </li>
              <li>
                <img src="../img/bmwx1/TMO02508.JPG" alt="carro">
              </li>
              <li>
                <img src="../img/bmwx1/TMO02510.JPG" alt="carro">
              </li>
              <li>
                <img src="../img/bmwx1/TMO02523.JPG" alt="carro">
              </li>
            </ul>
          </nav>
        </div>
        <div id="img-main">
          <img src="../img/bmwx1/TMO02489.JPG" alt="carro">
        </div>
      </div>
      <div class="contato-formulario" aria-label="Formulário">
        <form class="form">
          <div>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome">
          </div>
          <div>
            <label for="telefone">Telefone/whats</label>
            <input type="text" id="telefone" name="telefone" placeholder="(21) 9999-9999">
          </div>
          <div class="email">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="contato@email.com">
          </div>
          <div class="mensagem">
            <label for="mensagem">Mensagem</label>
            <textarea rows="6" id="mensagem" name="mensagem" placeholder="O que você precisa?"></textarea>
          </div>
          <div class="btn-contato">
            <button>Enviar Mensagem</button>
          </div>
        </form>
        <div id="contato02">
          <p>ou</p>
          <button class="whatsapp">Fale conosco no whatsapp <img src="../img/whatsapp.svg" alt="whatsapp"></button>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div id="container-car">
    </div>  
  </section>

  <script type="module" src="../script.js"></script>
</body>

</html>
